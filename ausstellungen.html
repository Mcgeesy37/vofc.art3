<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0b0b0c" />
    <title>Ausstellungen — Voices of Creation e.V.</title>
    <meta name="description" content="Ausstellungen — coming soon." />

    <link rel="icon" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />

    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const fromQuery = params.get("lang");
        const fromStorage = localStorage.getItem("vofc_lang");
        const lang = (fromQuery || fromStorage || "de").toLowerCase();
        if (lang !== "de" && lang !== "en") return;
        localStorage.setItem("vofc_lang", lang);
        document.documentElement.lang = lang;
        window.__VOFC_LANG__ = lang;
      })();
    </script>

    <style>
      /* small page-specific layout, keeps global CSS untouched */
      .page-hero {
        padding: 34px 0 50px 0;
      }
      .page-hero__grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
      }
      .coming {
        border-radius: var(--radius-lg);
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: rgba(255, 255, 255, 0.65);
        box-shadow: 0 12px 36px rgba(0,0,0,.08);
        padding: 18px;
      }
      .coming__badge {
        display: inline-flex;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255,255,255,.75);
        font-size: 12px;
      }
      .coming h1 {
        margin-top: 12px;
        font-size: clamp(34px, 4.4vw, 52px);
        line-height: 1.05;
      }
      .coming p { margin-top: 10px; color: var(--muted); max-width: 60ch; }
      .back-row { margin-top: 16px; display:flex; gap:12px; flex-wrap:wrap; }
      .hero-mini {
        border-radius: var(--radius-lg);
        overflow: hidden;
        border: 1px solid rgba(0,0,0,.10);
        box-shadow: var(--shadow);
      }
      .hero-mini img { width:100%; height:100%; object-fit:cover; }
      @media (min-width: 860px){
        .page-hero__grid { grid-template-columns: .95fr 1.05fr; align-items: stretch; }
      }
    </style>
  </head>

  <body>
    <header class="simple-header">
      <div class="container simple-header__row">
        <a class="brand brand--small" href="./" aria-label="Home">
          <img src="assets/logo.png" alt="Voices of Creation Logo" width="180" height="58" />
        </a>

        <nav class="simple-nav" aria-label="Quick">
          <a href="./" data-i18n="nav.home">Home</a>
          <a href="impressum.html" data-i18n="legal.imprint">Impressum</a>
          <a href="datenschutz.html" data-i18n="legal.privacy">Datenschutz</a>
        </nav>
      </div>
    </header>

    <main class="container page-hero">
      <div class="page-hero__grid">
        <section class="coming" aria-label="Coming soon">
          <span class="coming__badge" data-i18n="coming.badge">Coming soon</span>
          <h1 data-i18n="coming.title">Ausstellungen</h1>
          <p data-i18n="coming.text">
            Diese Seite befindet sich im Aufbau. In Kürze finden Sie hier kuratierte Ausstellungen, Archive und Highlights.
          </p>

          <div class="back-row">
            <a class="btn btn--primary" href="./" data-i18n="coming.back">Zurück zur Startseite</a>
            <a class="btn btn--ghost" href="mailto:info@vofc.art" data-i18n="coming.mail">Kontakt</a>
          </div>
        </section>

        <div class="hero-mini" aria-hidden="true">
          <img src="assets/card-exhibitions.jpg" alt="" loading="eager" width="1400" height="900" />
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container subfooter" aria-label="Legal">
        <div class="subfooter__left">
          <a href="impressum.html" data-i18n="legal.imprint">Impressum</a>
          <a href="datenschutz.html" data-i18n="legal.privacy">Datenschutz</a>
        </div>
        <div class="subfooter__right">
          <span class="muted" data-i18n="legal.copy">© <span id="year"></span> Voices of Creation e.V.</span>
        </div>
      </div>
    </footer>

    <script>
      const I18N = {
        de: {
          "nav.home": "Home",
          "legal.imprint": "Impressum",
          "legal.privacy": "Datenschutz",
          "legal.copy": "© {{year}} Voices of Creation e.V.",
          "coming.badge": "Coming soon",
          "coming.title": "Ausstellungen",
          "coming.text":
            "Diese Seite befindet sich im Aufbau. In Kürze finden Sie hier kuratierte Ausstellungen, Archive und Highlights.",
          "coming.back": "Zurück zur Startseite",
          "coming.mail": "Kontakt",
        },
        en: {
          "nav.home": "Home",
          "legal.imprint": "Imprint",
          "legal.privacy": "Privacy",
          "legal.copy": "© {{year}} Voices of Creation e.V.",
          "coming.badge": "Coming soon",
          "coming.title": "Exhibitions",
          "coming.text":
            "This page is under construction. Soon you'll find curated exhibitions, archives and highlights here.",
          "coming.back": "Back to homepage",
          "coming.mail": "Contact",
        },
      };

      function applyI18n(lang) {
        const dict = I18N[lang] || I18N.de;
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          let v = dict[key];
          if (!v) return;
          if (key === "legal.copy") v = v.replace("{{year}}", String(new Date().getFullYear()));
          el.textContent = v;
        });
      }

      (function init() {
        const y = document.getElementById("year");
        if (y) y.textContent = String(new Date().getFullYear());
        const lang = window.__VOFC_LANG__ || "de";
        applyI18n(lang);
      })();
    </script>
  </body>
</html>
